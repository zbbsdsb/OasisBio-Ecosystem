<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OasisBio Ecosystem - Social Preview</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            width: 1280px;
            height: 640px;
            background: linear-gradient(135deg, #0c0a1d 0%, #1e1b4b 50%, #0f0e2a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            position: relative;
            overflow: hidden;
        }
        
        .grid {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.08) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        
        .glow {
            position: absolute;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.3) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .content { position: relative; z-index: 10; text-align: center; max-width: 1100px; }
        
        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .logo-icon { font-size: 56px; }
        .logo-text { font-size: 56px; font-weight: 800; color: white; letter-spacing: -1px; }
        
        h1 {
            font-size: 26px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
            letter-spacing: 1px;
        }
        
        .packages { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; margin-top: 20px; }
        
        .package {
            background: rgba(99, 102, 241, 0.15);
            padding: 16px 24px;
            border-radius: 12px;
            border: 1px solid rgba(99, 102, 241, 0.4);
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            color: #a5b4fc;
        }
        
        .package .at { color: rgba(255, 255, 255, 0.4); }
        .package .name { color: white; font-weight: 600; }
        
        .footer {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 60px;
            z-index: 10;
        }
        
        .company-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .company-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: white;
            font-weight: bold;
        }
        
        .company-text { font-size: 16px; color: white; font-weight: 600; }
        .github-link { font-size: 16px; color: rgba(255, 255, 255, 0.7); }
        
        .badges { display: flex; gap: 12px; }
        
        .badge {
            background: rgba(99, 102, 241, 0.2);
            padding: 8px 16px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: #a5b4fc;
        }
    </style>
</head>
<body>
    <div class="grid"></div>
    <div class="glow"></div>
    
    <div class="content">
        <div class="logo-area">
            <span class="logo-icon">🧬</span>
            <span class="logo-text">OasisBio</span>
        </div>
        <h1>ECOSYSTEM</h1>
        
        <div class="packages">
            <div class="package"><span class="at">@</span><span class="name">oasisbio/</span>common-core</div>
            <div class="package"><span class="at">@</span><span class="name">oasisbio/</span>common-utils</div>
            <div class="package"><span class="at">@</span><span class="name">oasisbio/</span>common-auth</div>
            <div class="package"><span class="at">@</span><span class="name">oasisbio/</span>common-api</div>
            <div class="package"><span class="at">@</span><span class="name">oasisbio/</span>common-validators</div>
            <div class="package"><span class="at">@</span><span class="name">oasisbio/</span>common-services</div>
            <div class="package"><span class="at">@</span><span class="name">oasisbio/</span>design-system</div>
        </div>
    </div>
    
    <div class="footer">
        <div class="company-badge">
            <div class="company-icon">O</div>
            <span class="company-text">Oasis Company</span>
        </div>
        <div class="badges">
            <span class="badge">TypeScript</span>
            <span class="badge">Monorepo</span>
            <span class="badge">pnpm</span>
        </div>
        <span class="github-link">github.com/zbbsdsb</span>
    </div>
</body>
</html>
